<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none" role="img" aria-label="Mega Mendung cloud line motif">
  <defs>
    <!-- A single refined scrolling-cloud scroll, line-art (the Mega Mendung curl). -->
    <g id="scroll" fill="none" stroke="#6f93e6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 72 C0 30 33 9 64 20 C92 30 97 60 77 70 C61 78 49 64 58 54 C65 47 76 52 72 61"/>
      <path d="M11 72 C11 38 35 22 60 31 C82 39 86 60 72 67"/>
      <circle cx="64" cy="57" r="3.1"/>
    </g>
  </defs>

  <!-- far row (smaller, dimmer) -->
  <g opacity="0.5">
    <use href="#scroll" transform="translate(30 18) scale(0.66)"/>
    <use href="#scroll" transform="translate(170 10) scale(0.66)"/>
    <use href="#scroll" transform="translate(310 20) scale(0.66)"/>
    <use href="#scroll" transform="translate(450 10) scale(0.66)"/>
  </g>

  <!-- near row (full size) -->
  <g opacity="0.9">
    <use href="#scroll" transform="translate(-30 96)"/>
    <use href="#scroll" transform="translate(110 110)"/>
    <use href="#scroll" transform="translate(250 96)"/>
    <use href="#scroll" transform="translate(390 110)"/>
    <use href="#scroll" transform="translate(530 96)"/>
  </g>
</svg>
